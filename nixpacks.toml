providers = ["node"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "cd lib/db && npx drizzle-kit push --force --config ./drizzle.config.ts && cd ../.. && node artifacts/api-server/dist/index.cjs"
